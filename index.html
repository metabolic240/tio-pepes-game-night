<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ff4d6d" />
  <meta name="app-version" content="color-rings-v4" />
  <title>Tío Pepe’s Game Night Picker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="splash" aria-hidden="true">
    <div class="splash-card">
      <span class="splash-title">Tío Pepe’s</span>
      <span class="splash-subtitle">Game Night Picker</span>
      <span class="splash-prompt">Touch anywhere to begin</span>
    </div>
  </div>

  <canvas id="gameCanvas" aria-label="Finger picker play area"></canvas>

  <div id="countdown" aria-live="polite"></div>
  <div id="status" aria-live="polite"></div>
  <div id="versionBadge">Color rings v4</div>
  <button id="replayBtn" type="button">Play again</button>
  <div id="hint">Place your fingers and hold…</div>

  <script src="app.js?v=color-rings-v4" defer></script>
</body>
</html>
